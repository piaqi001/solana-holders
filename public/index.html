
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Solana 前200持仓查询器</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; }
    input, button { padding: 0.5rem; font-size: 1rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { border: 1px solid #ccc; padding: 0.5rem; }
    th { background: #eee; }
  </style>
</head>
<body>
  <h1>Solana 前200持仓地址查询</h1>
  <input id="tokenInput" placeholder="请输入SPL代币地址" style="width:70%" />
  <button onclick="query()">查询</button>
  <div id="loading" style="margin:1rem 0;"></div>
  <div id="result"></div>

  <script>
    async function query() {
      const token = document.getElementById('tokenInput').value.trim();
      const loading = document.getElementById('loading');
      const result = document.getElementById('result');
      loading.innerText = '查询中，请稍候...';
      result.innerHTML = '';

      try {
        const res = await fetch('/api/holders?token=' + token);
        const data = await res.json();
        if (!Array.isArray(data)) throw new Error('返回数据格式不正确');

        let html = '<table><tr><th>排名</th><th>地址</th><th>余额</th></tr>';
        data.forEach((item, i) => {
          html += `<tr><td>${i+1}</td><td><a href="https://explorer.solana.com/address/${item.owner}" target="_blank">${item.owner}</a></td><td>${item.amount.toLocaleString()}</td></tr>`;
        });
        html += '</table>';
        result.innerHTML = html;
      } catch (err) {
        result.innerHTML = '<p style="color:red">查询失败：' + err.message + '</p>';
        console.error(err);
      } finally {
        loading.innerText = '';
      }
    }
  </script>
</body>
</html>
