
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Solana 前200持仓地址查询</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    input { padding: 6px; width: 480px; }
    button { padding: 6px 12px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    th { background-color: #f2f2f2; }
    a { color: blue; text-decoration: underline; }
  </style>
</head>
<body>
  <h2>Solana 前200持仓地址查询</h2>
  <input type="text" id="tokenInput" placeholder="输入 Token Mint 地址" value="FtUEW73K6vEYHfbkfpdBZfWpxgQar2HipGdbutEhpump">
  <button onclick="query()">查询</button>

  <table>
    <thead>
      <tr>
        <th>排名</th>
        <th>地址</th>
        <th>余额</th>
      </tr>
    </thead>
    <tbody id="resultBody"></tbody>
  </table>

  <script>
    async function query() {
      const token = document.getElementById('tokenInput').value.trim();
      const response = await fetch(`/api/holders?token=${token}`);
      const data = await response.json();
      const tbody = document.getElementById('resultBody');
      tbody.innerHTML = '';

      if (!Array.isArray(data)) {
        tbody.innerHTML = '<tr><td colspan="3">查询失败</td></tr>';
        return;
      }

      data.forEach((item, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${index + 1}</td>
          <td><a href="https://solscan.io/account/${item.wallet}" target="_blank">${item.wallet}</a></td>
          <td>${item.amount}</td>
        `;
        tbody.appendChild(row);
      });
    }
  </script>
</body>
</html>
