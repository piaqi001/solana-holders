
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Solana 多代币前持仓查询</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    input { padding: 6px; width: 480px; margin-bottom: 10px; display: block; }
    button { padding: 6px 12px; margin-bottom: 20px; }
    h3 { margin-top: 40px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    th { background-color: #f2f2f2; }
    a { color: blue; text-decoration: underline; }
  </style>
</head>
<body>
  <h2>Solana 多代币前 400 持仓地址查询</h2>

  <input type="text" id="token1" placeholder="请输入第一个代币 Mint 地址" value="">
  <input type="text" id="token2" placeholder="请输入第二个代币 Mint 地址" value="">
  <input type="text" id="token3" placeholder="请输入第三个代币 Mint 地址" value="">
  <button onclick="queryAll()">查询</button>

  <div id="results"></div>

  <script>
    async function queryHolders(token, index) {
      const results = [];
      for (let page = 0; page < 2; page++) {
        const response = await fetch(`/api/holders?token=${token}&page=${page}`);
        const data = await response.json();
        if (Array.isArray(data)) results.push(...data);
        if (data.length < 200) break;
      }

      const container = document.createElement('div');
      container.innerHTML = `<h3>代币 ${index + 1}</h3><table><thead><tr><th>排名</th><th>地址</th><th>余额</th></tr></thead><tbody id="table-${index}"></tbody></table>`;
      document.getElementById('results').appendChild(container);

      const tbody = document.getElementById(`table-${index}`);
      results.slice(0, 400).forEach((item, i) => {
        const row = document.createElement('tr');
        row.innerHTML = \`
          <td>\${i + 1}</td>
          <td><a href="https://solscan.io/account/\${item.wallet}" target="_blank">\${item.wallet}</a></td>
          <td>\${item.amount}</td>
        \`;
        tbody.appendChild(row);
      });
    }

    async function queryAll() {
      document.getElementById('results').innerHTML = '';
      const tokens = [
        document.getElementById('token1').value.trim(),
        document.getElementById('token2').value.trim(),
        document.getElementById('token3').value.trim()
      ].filter(Boolean);

      for (let i = 0; i < tokens.length; i++) {
        await queryHolders(tokens[i], i);
      }
    }
  </script>
</body>
</html>
